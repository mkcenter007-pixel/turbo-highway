<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Turbo Highway</title>
<meta name="theme-color" content="#060612">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  --neon:#00e5ff;--neon2:#7c3aed;--gold:#f5a623;--red:#ff3b5c;--green:#00ff88;
  --bg:#060612;--font-display:'Orbitron',monospace;--font-body:'Inter',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100vh;font-family:var(--font-body);overflow:hidden;touch-action:none;}
#gw{width:100%;max-width:440px;position:relative;flex-shrink:0;}
#gc{display:block;width:100%;}

/* HUD */
#hud{position:absolute;top:0;left:0;width:100%;padding:9px 11px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;gap:4px;}
.hstat{display:flex;flex-direction:column;}
.hstat.r{align-items:flex-end;}
.hlab{font-family:var(--font-display);font-size:7px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,0.35);text-transform:uppercase;}
.hval{font-family:var(--font-display);font-size:15px;font-weight:900;color:#fff;text-shadow:0 0 10px var(--neon);line-height:1.1;}
.hval.gold{color:var(--gold);text-shadow:0 0 10px var(--gold);}
#hhearts{display:flex;gap:2px;margin-top:1px;}
.hrt{font-size:13px;filter:drop-shadow(0 0 4px var(--red));transition:all 0.3s;}
.hrt.lost{filter:none;opacity:0.15;}
#hcoin{display:flex;align-items:center;gap:3px;background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.25);border-radius:20px;padding:2px 7px;}
#hcoin span{font-family:var(--font-display);font-size:10px;font-weight:700;color:var(--gold);}
#hlvl{font-family:var(--font-display);font-size:8px;font-weight:700;color:var(--neon);background:rgba(0,229,255,0.08);border:1px solid rgba(0,229,255,0.18);border-radius:10px;padding:2px 7px;letter-spacing:1px;}
#hpow{display:flex;gap:3px;flex-wrap:wrap;justify-content:center;max-width:80px;}
.pchip{font-size:10px;background:rgba(255,255,255,0.07);border-radius:10px;padding:2px 6px;border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;gap:2px;}
.pchip span{font-family:var(--font-display);font-size:7px;color:#fff;font-weight:700;}

/* Speed bar */
#sbar{position:absolute;bottom:0;left:0;width:100%;height:3px;background:rgba(255,255,255,0.05);}
#sfill{height:100%;width:0%;background:linear-gradient(90deg,var(--neon),var(--neon2));box-shadow:0 0 6px var(--neon);}

/* Overlay */
#ov{position:absolute;inset:0;background:rgba(6,6,18,0.9);backdrop-filter:blur(18px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;padding:18px;}
.ov-logo{font-family:var(--font-display);font-size:26px;font-weight:900;letter-spacing:4px;background:linear-gradient(135deg,var(--neon),var(--neon2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:2px;}
.ov-sub{font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:3px;text-transform:uppercase;}
.ov-scores{display:flex;gap:20px;}
.osc .l{font-size:8px;color:rgba(255,255,255,0.3);font-family:var(--font-display);letter-spacing:1px;text-transform:uppercase;text-align:center;}
.osc .v{font-family:var(--font-display);font-size:17px;font-weight:900;color:#fff;text-align:center;}
.osc .v.g{color:var(--gold);text-shadow:0 0 10px var(--gold);}
#fscore{font-family:var(--font-display);font-size:11px;color:var(--red);text-align:center;line-height:1.7;display:none;}
.btns{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-top:3px;}
.gbtn{font-family:var(--font-display);font-size:10px;font-weight:700;letter-spacing:1px;border:none;border-radius:11px;padding:11px 20px;cursor:pointer;transition:all 0.15s;text-transform:uppercase;}
.gbtn:active{transform:scale(0.96);}
.gbtn.pr{background:linear-gradient(135deg,var(--neon),var(--neon2));color:#000;}
.gbtn.sc{background:rgba(255,255,255,0.05);color:#fff;border:1px solid rgba(255,255,255,0.1);}
.gbtn.go{background:linear-gradient(135deg,var(--gold),#d07000);color:#000;}
.gbtn.ad{background:linear-gradient(135deg,var(--red),#aa0022);color:#fff;width:100%;}
.mode-tabs{display:flex;gap:5px;}
.mtab{font-family:var(--font-display);font-size:9px;font-weight:700;padding:7px 14px;border-radius:9px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.35);cursor:pointer;letter-spacing:1px;transition:all 0.2s;}
.mtab.on{background:linear-gradient(135deg,var(--neon),var(--neon2));color:#000;border-color:transparent;}
.ov-hint{font-size:9px;color:rgba(255,255,255,0.18);text-align:center;}
.nbest{font-family:var(--font-display);font-size:9px;color:var(--gold);letter-spacing:2px;animation:pulse 1s infinite;display:none;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* Mute */
#muteBtn{position:absolute;top:8px;right:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:7px;color:rgba(255,255,255,0.45);font-size:13px;padding:3px 7px;cursor:pointer;z-index:10;}

/* Ad */
#adOv{position:fixed;inset:0;background:rgba(6,6,18,0.95);backdrop-filter:blur(20px);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:12px;}
.adcard{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:18px;width:280px;padding:22px;text-align:center;}
.adcard h3{font-family:var(--font-display);font-size:13px;color:var(--gold);margin-bottom:5px;letter-spacing:1px;}
.adcard p{font-size:11px;color:rgba(255,255,255,0.35);margin-bottom:12px;}
#adTim{font-family:var(--font-display);font-size:34px;font-weight:900;color:var(--neon);text-shadow:0 0 18px var(--neon);}
#adSkip{width:100%;margin-top:10px;font-family:var(--font-display);font-size:10px;font-weight:700;border:none;border-radius:9px;padding:9px;cursor:not-allowed;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.25);letter-spacing:1px;}
#adSkip.rdy{background:linear-gradient(135deg,var(--neon),var(--neon2));color:#000;cursor:pointer;}
#adRew{color:var(--green);font-size:11px;font-family:var(--font-display);display:none;margin-top:7px;letter-spacing:1px;}

/* Shop */
#shopOv{position:fixed;inset:0;background:rgba(6,6,18,0.97);backdrop-filter:blur(20px);display:none;flex-direction:column;align-items:center;z-index:8888;overflow-y:auto;padding:14px;}
.shdr{font-family:var(--font-display);font-size:15px;font-weight:900;color:var(--gold);letter-spacing:2px;margin-bottom:3px;}
.scoin{font-family:var(--font-display);font-size:11px;color:var(--gold);margin-bottom:10px;}
.ssec{width:100%;max-width:400px;margin-bottom:12px;}
.ssec h3{font-family:var(--font-display);font-size:8px;color:rgba(255,255,255,0.25);letter-spacing:2px;margin-bottom:6px;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,0.05);padding-bottom:5px;}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
.si{background:rgba(255,255,255,0.02);border:1.5px solid rgba(255,255,255,0.06);border-radius:11px;padding:7px 4px;text-align:center;cursor:pointer;transition:all 0.15s;}
.si.owned{border-color:rgba(0,255,136,0.35);}
.si.sel{border-color:var(--neon);background:rgba(0,229,255,0.05);box-shadow:0 0 10px rgba(0,229,255,0.08);}
.si canvas{display:block;margin:0 auto 3px;}
.si .sn{font-family:var(--font-display);font-size:8px;font-weight:700;color:#fff;letter-spacing:0.5px;}
.si .sp{font-size:8px;color:var(--gold);margin-top:2px;}
.si .ss{font-size:7px;margin-top:2px;}
.si.owned .ss{color:var(--green);}
.si.sel .ss{color:var(--neon);}
.si:not(.owned):not(.sel) .ss{color:rgba(255,255,255,0.25);}

/* Popup */
#popup{position:absolute;left:50%;transform:translateX(-50%);top:34%;font-family:var(--font-display);font-size:13px;font-weight:900;opacity:0;pointer-events:none;z-index:20;white-space:nowrap;text-align:center;letter-spacing:1px;}

/* Level up */
#lvlup{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:25;opacity:0;}
.lui{font-family:var(--font-display);font-size:20px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--neon));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:3px;text-align:center;}
</style>
</head>
<body>

<div id="adOv">
  <div class="adcard">
    <h3>WATCH AD</h3>
    <p>Watch a short ad to get 1 heart back!</p>
    <div id="adTim">5</div>
    <div id="adRew">❤️ HEART RESTORED!</div>
    <button id="adSkip">WAIT 5s...</button>
  </div>
</div>

<div id="shopOv">
  <div class="shdr">🛒 GARAGE</div>
  <div class="scoin">🪙 <span id="shopC">0</span> coins</div>
  <div class="ssec"><h3>🚗 Cars</h3><div class="sgrid" id="carG"></div></div>
  <div class="ssec"><h3>🛣️ Roads</h3><div class="sgrid" id="roadG"></div></div>
  <button class="gbtn sc" id="closeShop" style="margin-bottom:14px;">✕ CLOSE</button>
</div>

<div id="gw">
  <canvas id="gc" width="420" height="560"></canvas>
  <div id="hud">
    <div class="hstat">
      <div class="hlab">Score</div>
      <div class="hval" id="hsc">0</div>
      <div id="hhearts"><span class="hrt" id="h1">❤️</span><span class="hrt" id="h2">❤️</span><span class="hrt" id="h3">❤️</span></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
      <div id="hlvl">LVL 1</div>
      <div id="hcoin">🪙<span id="hcc">0</span></div>
      <div id="hpow"></div>
    </div>
    <div class="hstat r">
      <div class="hlab">Best</div>
      <div class="hval gold" id="hbst">0</div>
      <div class="hlab" style="margin-top:3px;">Time</div>
      <div class="hval" style="font-size:12px;" id="htim">0s</div>
    </div>
  </div>
  <button id="muteBtn">🔊</button>
  <div id="sbar"><div id="sfill"></div></div>
  <div id="popup"></div>
  <div id="lvlup"><div class="lui"></div></div>
  <div id="ov">
    <div class="ov-logo">TURBO<br>HIGHWAY</div>
    <div class="ov-sub">2026 Edition</div>
    <div class="ov-scores">
      <div class="osc"><div class="l">Score</div><div class="v" id="ovSc">0</div></div>
      <div class="osc"><div class="l">Best</div><div class="v g" id="ovBst">0</div></div>
      <div class="osc"><div class="l">Level</div><div class="v" id="ovLvl">1</div></div>
    </div>
    <div class="nbest" id="newBest">🏆 NEW BEST!</div>
    <div id="fscore"></div>
    <div style="font-size:20px;letter-spacing:3px;">❤️❤️❤️</div>
    <div class="mode-tabs">
      <div class="mtab on" id="tabRace">RACE</div>
      <div class="mtab" id="tabFree">FREE DRIVE</div>
    </div>
    <div class="btns">
      <button class="gbtn pr" id="startBtn">▶ START</button>
      <button class="gbtn go" id="shopBtn">🛒 GARAGE</button>
    </div>
    <button class="gbtn ad" id="watchAdBtn" style="display:none;">❤️ WATCH AD — REVIVE</button>
    <div class="ov-hint">👆 drag car left/right to steer</div>
  </div>
</div>

<script>
var ADMOB_APP_ID='ca-app-pub-1457874111562192~2213651246';
var ADMOB_BANNER_ID='ca-app-pub-1457874111562192/4249621792';
var ADMOB_REWARDED_ID='ca-app-pub-1457874111562192/6325120790';

(function(){
  var mf={name:"Turbo Highway",short_name:"TurboHwy",start_url:"/turbo-highway/",scope:"/turbo-highway/",display:"fullscreen",orientation:"portrait",background_color:"#060612",theme_color:"#00e5ff",icons:[{src:"https://placehold.co/192x192/00e5ff/060612?text=TH",sizes:"192x192",type:"image/png",purpose:"any maskable"},{src:"https://placehold.co/512x512/7c3aed/060612?text=TH",sizes:"512x512",type:"image/png",purpose:"any maskable"}]};
  var ml=document.createElement('link');ml.rel='manifest';ml.href=URL.createObjectURL(new Blob([JSON.stringify(mf)],{type:'application/json'}));document.head.appendChild(ml);
  if('serviceWorker' in navigator){
    var sw='const C="th-v10";self.addEventListener("install",function(e){e.waitUntil(caches.open(C).then(function(c){return c.addAll(["./"]);}));self.skipWaiting();});self.addEventListener("activate",function(e){e.waitUntil(caches.keys().then(function(ks){return Promise.all(ks.filter(function(k){return k!==C;}).map(function(k){return caches.delete(k);}));}));self.clients.claim();});self.addEventListener("fetch",function(e){e.respondWith(caches.match(e.request).then(function(r){return r||fetch(e.request);}));});';
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(function(){});
  }
})();

var gc=document.getElementById('gc');
var ctx=gc.getContext('2d');
var W=420,H=560;
var RL=78,RR=342,RW=264,LC=3,LW=RW/LC;
var LANES=[0,1,2].map(function(i){return RL+LW*i+LW/2;});
var MIN_SPD=3,MAX_SPD=22,RAMP=90;

function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function ld(k,d){try{var v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch(e){return d;}}

var CARS=[
  {id:'cyan',  name:'Cyber',  price:0,   col:'#00ccee',acc:'#003344',owned:true},
  {id:'red',   name:'Devil',  price:80,  col:'#ff3b5c',acc:'#660018',owned:false},
  {id:'gold',  name:'Rush',   price:150, col:'#f5a623',acc:'#6a3a00',owned:false},
  {id:'purple',name:'Ghost',  price:250, col:'#9b59b6',acc:'#3a0060',owned:false},
  {id:'green', name:'Viper',  price:400, col:'#00ff88',acc:'#004422',owned:false},
  {id:'black', name:'Shadow', price:600, col:'#8888aa',acc:'#111122',owned:false},
];
var ROADS=[
  {id:'city',   name:'City',   price:0,   grass:'#1a321a',road:'#252525',line:'#00e5ff',owned:true},
  {id:'desert', name:'Desert', price:100, grass:'#7a5c2a',road:'#c8a96e',line:'#fffde7',owned:false},
  {id:'arctic', name:'Arctic', price:200, grass:'#c8dde8',road:'#dde8ee',line:'#4499cc',owned:false},
  {id:'neon',   name:'Neon',   price:350, grass:'#0a0a1a',road:'#1a0a2e',line:'#ff00ff',owned:false},
  {id:'lava',   name:'Lava',   price:500, grass:'#3a0a00',road:'#1a0800',line:'#ff4400',owned:false},
  {id:'galaxy', name:'Galaxy', price:800, grass:'#050510',road:'#08001a',line:'#8844ff',owned:false},
];

var totalCoins=ld('coins',0);
var bestScore=ld('best',0);
var selectedCar=ld('car','cyan');
var selectedRoad=ld('road','city');
var ownedCars=ld('ownedCars',['cyan']);
var ownedRoads=ld('ownedRoads',['city']);
CARS.forEach(function(c){c.owned=ownedCars.indexOf(c.id)>=0;});
ROADS.forEach(function(r){r.owned=ownedRoads.indexOf(r.id)>=0;});

function saveAll(){
  sv('coins',totalCoins);sv('best',bestScore);
  sv('car',selectedCar);sv('road',selectedRoad);
  sv('ownedCars',CARS.filter(function(c){return c.owned;}).map(function(c){return c.id;}));
  sv('ownedRoads',ROADS.filter(function(r){return r.owned;}).map(function(r){return r.id;}));
}
function getCar(){return CARS.find(function(c){return c.id===selectedCar;})||CARS[0];}
function getRoad(){return ROADS.find(function(r){return r.id===selectedRoad;})||ROADS[0];}

var state=null,animId=null,muted=false,adUsed=false;
var lives=3,maxLives=3;
var invincible=false,invTimer=0;
var nitroOn=false,nitroT=0,shieldOn=false,shieldT=0,slowOn=false,slowT=0;
var sessionCoins=0,level=1,gameMode='race';
var POWER_DUR=200;

var bgMusic=null;
function initMusic(){if(bgMusic)return;bgMusic=new Audio('music.mp3');bgMusic.loop=true;bgMusic.volume=0.45;}
function playMusic(){if(!bgMusic||muted)return;bgMusic.currentTime=0;var p=bgMusic.play();if(p&&p.catch)p.catch(function(){});}
function stopMusic(){if(!bgMusic)return;bgMusic.pause();bgMusic.currentTime=0;}

var AC=null;
function initAC(){if(AC)return;try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function resumeAC(){if(AC&&AC.state==='suspended')AC.resume();}
function beep(f,tp,dur,vol,del){
  if(!AC)return;resumeAC();
  var now=AC.currentTime+(del||0);
  var o=AC.createOscillator(),g=AC.createGain();
  o.type=tp||'sine';o.frequency.value=f;o.connect(g);g.connect(AC.destination);
  g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(vol||0.3,now+0.01);
  g.gain.linearRampToValueAtTime(0,now+dur);o.start(now);o.stop(now+dur+0.02);
}
function sfxCoin(){[880,1100,1320].forEach(function(f,i){beep(f,'sine',0.09,0.14,i*0.05);});}
function sfxCrash(){
  beep(200,'sawtooth',0.3,0.65);
  if(!AC)return;resumeAC();
  var now=AC.currentTime,len=Math.floor(AC.sampleRate*0.28);
  var buf=AC.createBuffer(1,len,AC.sampleRate),d=buf.getChannelData(0);
  for(var i=0;i<len;i++)d[i]=Math.random()*2-1;
  var src=AC.createBufferSource();src.buffer=buf;
  var g=AC.createGain();src.connect(g);g.connect(AC.destination);
  g.gain.setValueAtTime(0.38,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.28);
  src.start(now);src.stop(now+0.3);
}
function sfxBox(){[330,440,550,660].forEach(function(f,i){beep(f,'square',0.1,0.16,i*0.06);});}
function sfxNitro(){beep(120,'sawtooth',0.45,0.28);beep(240,'sawtooth',0.45,0.18,0.05);}
function sfxHeart(){[523,659,784].forEach(function(f,i){beep(f,'sine',0.13,0.28,i*0.09);});}
function sfxLevel(){[440,550,660,880].forEach(function(f,i){beep(f,'sine',0.15,0.25,i*0.08);});}
function sfxHole(){beep(80,'sine',0.35,0.45);beep(50,'sine',0.45,0.35,0.1);}

function showPopup(txt,col){
  var p=document.getElementById('popup');
  p.innerHTML=txt;p.style.color=col||'#f5a623';p.style.textShadow='0 0 14px '+(col||'#f5a623');
  p.style.transition='none';p.style.opacity='1';p.style.top='32%';
  setTimeout(function(){p.style.transition='opacity 1s,top 1s';p.style.opacity='0';p.style.top='14%';},90);
}
function showLevelUp(lvl){
  var el=document.getElementById('lvlup');
  el.querySelector('.lui').innerHTML='LEVEL '+lvl+'<br><span style="font-size:11px;letter-spacing:2px;">UNLOCKED</span>';
  el.style.transition='none';el.style.opacity='1';
  setTimeout(function(){el.style.transition='opacity 1.2s';el.style.opacity='0';},1600);
}
function updateHearts(){
  for(var i=1;i<=maxLives;i++){var el=document.getElementById('h'+i);if(el){if(i<=lives)el.classList.remove('lost');else el.classList.add('lost');}}
}
function updatePower(){
  var h=document.getElementById('hpow');h.innerHTML='';
  if(shieldOn){var d=document.createElement('div');d.className='pchip';d.innerHTML='🛡️<span>'+Math.ceil(shieldT/60)+'s</span>';h.appendChild(d);}
  if(nitroOn){var d2=document.createElement('div');d2.className='pchip';d2.innerHTML='⚡<span>'+Math.ceil(nitroT/60)+'s</span>';h.appendChild(d2);}
  if(slowOn){var d3=document.createElement('div');d3.className='pchip';d3.innerHTML='🐢<span>'+Math.ceil(slowT/60)+'s</span>';h.appendChild(d3);}
}
function getLevel(sc){return Math.min(10,1+Math.floor(sc/600));}
function checkLevel(sc){
  var nl=getLevel(sc);
  if(nl>level){level=nl;document.getElementById('hlvl').textContent='LVL '+level;sfxLevel();showLevelUp(level);}
}

// ── Drag (less sensitive, 55px threshold) ──
var dragActive=false,dragStartX=0,dragStartLane=1;
var DRAG_THRESH=55;
gc.addEventListener('touchstart',function(e){
  var rect=gc.getBoundingClientRect();
  var relY=(e.touches[0].clientY-rect.top)/rect.height;
  if(relY>0.3){e.preventDefault();dragActive=true;dragStartX=e.touches[0].clientX;dragStartLane=state?state.playerLane:1;initAC();resumeAC();}
},{passive:false});
gc.addEventListener('touchmove',function(e){
  if(!dragActive||!state||!state.running)return;e.preventDefault();
  var dx=e.touches[0].clientX-dragStartX;
  var scale=W/gc.getBoundingClientRect().width;

var scenery=[];
function initScenery(){
  scenery=[];var types=[0,0,1,2,2,3,3,4];
  for(var i=0;i<22;i++){
    var side=i%2===0?'L':'R';

function drawTree(x,y,s,ph){
  ctx.fillStyle='#5a3815';ctx.fillRect(x-3*s,y,6*s,16*s);
  var hue=118+Math.sin(ph)*5;
  ctx.fillStyle='hsl('+hue+',52%,'+(26+Math.sin(ph)*4)+'%)';ctx.beginPath();ctx.ellipse(x,y-8*s,15*s,19*s,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='hsl('+(hue+5)+',57%,'+(33+Math.sin(ph)*4)+'%)';ctx.beginPath();ctx.ellipse(x,y-19*s,11*s,14*s,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='hsl('+(hue+10)+',62%,'+(40+Math.sin(ph)*4)+'%)';ctx.beginPath();ctx.ellipse(x,y-28*s,8*s,11*s,0,0,Math.PI*2);ctx.fill();
}
function drawPalm(x,y,s,ph){
  ctx.strokeStyle='#7a5c2a';ctx.lineWidth=4*s;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x,y+4*s);ctx.quadraticCurveTo(x+5*s,y-10*s,x+2*s,y-30*s);ctx.stroke();
  for(var a=0;a<6;a++){
    var ang=-0.4+a*(Math.PI/3)+Math.sin(ph+a*0.6)*0.18;
    ctx.strokeStyle='hsl('+(106+a*3)+',55%,32%)';ctx.lineWidth=2.5*s;
    ctx.beginPath();ctx.moveTo(x+2*s,y-30*s);ctx.quadraticCurveTo(x+Math.cos(ang)*16*s+2*s,y-30*s+Math.sin(ang)*7*s,x+Math.cos(ang)*29*s+2*s,y-30*s+Math.sin(ang)*14*s);ctx.stroke();
  }
}
function drawBush(x,y,s){
  ctx.fillStyle='#27501a';ctx.beginPath();ctx.ellipse(x,y,13*s,8*s,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#35701f';ctx.beginPath();ctx.ellipse(x-5*s,y-4*s,8*s,6*s,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(x+5*s,y-4*s,8*s,6*s,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#428a22';ctx.beginPath();ctx.ellipse(x,y-7*s,8*s,6*s,0,0,Math.PI*2);ctx.fill();
}
function drawBuilding(x,y,s,side){
  var w=Math.max(20,Math.floor(25*s)),h=Math.max(30,Math.floor(55*s+s*18));
  var bx=side==='L'?x-w:x,hue=210+s*18;
  ctx.fillStyle='hsl('+hue+',16%,'+(18+s*8)+'%)';ctx.fillRect(bx,y-h,w,h);
  var ws=Math.max(3,Math.floor(4*s)),wg=Math.floor(8*s);
  for(var wy=y-h+5;wy<y-5;wy+=wg)for(var wx=bx+3;wx<bx+w-3;wx+=wg){
    ctx.fillStyle=(Math.sin(wx*0.31+wy*0.19)>-0.2)?'rgba(255,235,100,0.7)':'rgba(40,60,130,0.2)';ctx.fillRect(wx,wy,ws,ws);
  }
  ctx.fillStyle='hsl('+hue+',12%,28%)';ctx.fillRect(bx,y-h-2,w,3);
}
function drawLamp(x,y,s,side){
  ctx.strokeStyle='#666';ctx.lineWidth=1.8*s;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y-24*s);ctx.stroke();
  var ax=side==='L'?x+7*s:x-7*s;
  ctx.beginPath();ctx.moveTo(x,y-24*s);ctx.lineTo(ax,y-24*s);ctx.stroke();
  ctx.fillStyle='rgba(255,240,120,0.9)';ctx.shadowColor='rgba(255,240,100,0.5)';ctx.shadowBlur=5;
  ctx.beginPath();ctx.ellipse(ax,y-24*s,3.5*s,2*s,0,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
}
function updateScenery(px){for(var i=0;i<scenery.length;i++){scenery[i].y+=px*0.52;scenery[i].ph+=0.016;if(scenery[i].y>H+100)scenery[i].y=-100;}}
function drawScenery(){
  for(var i=0;i<scenery.length;i++){
    var sc=scenery[i];
    if(sc.type===0||sc.type===3)drawTree(sc.x,sc.y,sc.sc,sc.ph);
    else if(sc.type===1)drawPalm(sc.x,sc.y,sc.sc,sc.ph);
    else if(sc.type===2)drawBush(sc.x,sc.y,sc.sc);
    else if(sc.type===4)drawBuilding(sc.x,sc.y,sc.sc,sc.side);
    else drawLamp(sc.x,sc.y,sc.sc,sc.side);
  }
}

// ── Road ──
function shHex(hex,amt){
  hex=(hex||'#333').replace('#','');if(hex.length===3)hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  return '#'+[[0,2],[2,4],[4,6]].map(function(sl){return Math.max(0,Math.min(255,parseInt(hex.slice(sl[0],sl[1]),16)+amt)).toString(16).padStart(2,'0');}).join('');
}
var dashOff=0;
function drawRoad(){
  var road=getRoad();
  ctx.fillStyle='#101010';ctx.fillRect(0,0,W,H);
  ctx.fillStyle=road.grass;ctx.fillRect(0,0,RL,H);ctx.fillRect(RR,0,W-RR,H);
  ctx.fillStyle='#2a2622';ctx.fillRect(RL-14,0,14,H);ctx.fillRect(RR,0,14,H);
  ctx.fillStyle='#363230';ctx.fillRect(RL-16,0,3,H);ctx.fillRect(RR+13,0,3,H);
  var rg=ctx.createLinearGradient(RL,0,RR,0);
  rg.addColorStop(0,shHex(road.road,-12));rg.addColorStop(0.5,road.road);rg.addColorStop(1,shHex(road.road,-12));
  ctx.fillStyle=rg;ctx.fillRect(RL,0,RW,H);
  if(road.id==='neon'){{ctx.fillStyle='rgba(80,0,120,0.12)';ctx.fillRect(RL,0,RW,H);}}
  if(road.id==='lava'){ctx.fillStyle='rgba(60,0,0,0.18)';ctx.fillRect(RL,0,RW,H);}
  if(road.id==='galaxy'){ctx.fillStyle='rgba(8,0,28,0.25)';ctx.fillRect(RL,0,RW,H);}
  ctx.strokeStyle='rgba(255,255,255,0.75)';ctx.lineWidth=2.5;ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(RL,0);ctx.lineTo(RL,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(RR,0);ctx.lineTo(RR,H);ctx.stroke();
  if(road.id==='neon'||road.id==='galaxy'||road.id==='lava'){ctx.shadowColor=road.line;ctx.shadowBlur=7;}
  ctx.strokeStyle=road.line;ctx.lineWidth=2;ctx.setLineDash([26,18]);ctx.lineDashOffset=-dashOff;
  for(var i=1;i<LC;i++){var lx=RL+LW*i;ctx.beginPath();ctx.moveTo(lx,0);ctx.lineTo(lx,H);ctx.stroke();}
  ctx.setLineDash([]);ctx.shadowBlur=0;
}

// ── Cars (proper 2D top-down) ──
function rr(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();
}

// ── Pickups ──
var pickups=[];
var PTYPES=['coin','coin','coin','coin','box','box','nitro','hole','hole','slow'];
function spawnPickup(){
  var lane=Math.floor(Math.random()*LC);
  var type=gameMode==='free'?'coin':PTYPES[Math.floor(Math.random()*PTYPES.length)];
  pickups.push({x:LANES[lane],y:-25,lane:lane,type:type,anim:Math.random()*Math.PI*2,done:false});
}
function updatePickups(px){
  for(var i=0;i<pickups.length;i++){pickups[i].y+=px;pickups[i].anim+=0.08;}
  pickups=pickups.filter(function(p){return !p.done&&p.y<H+40;});
}
function drawPickups(){
  for(var i=0;i<pickups.length;i++){
    var p=pickups[i];var cy=p.y+Math.sin(p.anim)*4;
    if(p.type==='coin'){
      ctx.shadowColor='#f5a623';ctx.shadowBlur=10;
      ctx.fillStyle='#f5a623';ctx.beginPath();ctx.ellipse(p.x,cy,11,11,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffe066';ctx.beginPath();ctx.ellipse(p.x-2,cy-2,5,5,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#7a4800';ctx.font='bold 9px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('$',p.x,cy);
    } else if(p.type==='box'){
      var pulse=0.94+Math.sin(p.anim*2)*0.07;
      ctx.save();ctx.translate(p.x,cy);ctx.scale(pulse,pulse);
      ctx.shadowColor='#cc44ff';ctx.shadowBlur=13;
      ctx.fillStyle='#5500aa';ctx.fillRect(-12,-12,24,24);
      ctx.strokeStyle='#cc44ff';ctx.lineWidth=2;ctx.strokeRect(-12,-12,24,24);
      ctx.fillStyle='#fff';ctx.font='bold 14px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('?',0,1);
      ctx.shadowBlur=0;ctx.restore();
    } else if(p.type==='nitro'){
      ctx.shadowColor='#00e5ff';ctx.shadowBlur=13;
      ctx.fillStyle='#001520';ctx.beginPath();ctx.ellipse(p.x,cy,11,15,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#00e5ff';ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(p.x,cy,11,15,0,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle='#00e5ff';ctx.font='13px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('⚡',p.x,cy);
    } else if(p.type==='hole'){
      var rg2=ctx.createRadialGradient(p.x,cy,1,p.x,cy,14);
      rg2.addColorStop(0,'rgba(0,0,0,0.98)');rg2.addColorStop(0.6,'rgba(20,0,40,0.88)');rg2.addColorStop(1,'rgba(60,0,80,0)');
      ctx.fillStyle=rg2;ctx.beginPath();ctx.ellipse(p.x,cy,14,9,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(255,0,0,0.55)';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);
      ctx.beginPath();ctx.ellipse(p.x,cy,14,9,0,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
    } else if(p.type==='slow'){
      ctx.shadowColor='#00ff88';ctx.shadowBlur=11;
      ctx.fillStyle='#002a18';ctx.beginPath();ctx.ellipse(p.x,cy,11,11,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#00ff88';ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(p.x,cy,11,11,0,0,Math.PI*2);ctx.stroke();
      ctx.font='11px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🐢',p.x,cy);
    }
    ctx.shadowBlur=0;
  }
}
function checkPickups(px,py){
  for(var i=0;i<pickups.length;i++){
    var p=pickups[i];if(p.done)continue;
    if(Math.abs(px-p.x)<22&&Math.abs(py-p.y)<22){p.done=true;onPickup(p.type);}
  }
}
function onPickup(type){
  if(type==='coin'){
    sessionCoins++;totalCoins++;saveAll();document.getElementById('hcc').textContent=totalCoins;
    sfxCoin();showPopup('+1 🪙','#f5a623');
  } else if(type==='box'){
    sfxBox();var r=Math.random();
    if(r<0.33){if(lives<maxLives){lives++;updateHearts();sfxHeart();showPopup('📦 +1 ❤️','#ff3b5c');}else{totalCoins+=5;sessionCoins+=5;saveAll();document.getElementById('hcc').textContent=totalCoins;showPopup('📦 +5 🪙','#f5a623');}}
    else if(r<0.58){shieldOn=true;shieldT=POWER_DUR;showPopup('📦 🛡️ SHIELD!','#f5a623');}
    else if(r<0.8){slowOn=true;slowT=POWER_DUR;showPopup('📦 🐢 SLOW!','#00ff88');}
    else{nitroOn=true;nitroT=POWER_DUR;sfxNitro();showPopup('📦 ⚡ NITRO!','#00e5ff');}
    updatePower();
  } else if(type==='nitro'){nitroOn=true;nitroT=POWER_DUR;sfxNitro();showPopup('⚡ NITRO!','#00e5ff');updatePower();}
  else if(type==='slow'){slowOn=true;slowT=POWER_DUR;showPopup('🐢 SLOW!','#00ff88');updatePower();}
  else if(type==='hole'){if(shieldOn){showPopup('🛡️ BLOCKED!','#f5a623');return;}sfxHole();onCrash();}
}

var VTYPES=[
  {col:'#ff3b5c',style:'car'},{col:'#378add',style:'car'},{col:'#f5a623',style:'car'},
  {col:'#c0392b',style:'car'},{col:'#00ff88',style:'car'},{col:'#8e44ad',style:'car'},
  {col:'#16a085',style:'car'},{col:'#cc8800',style:'bus'},{col:'#154360',style:'bus'},
  {col:'#7b241c',style:'bus'},{col:'#145a32',style:'bus'}
];

function startGame(){
  document.getElementById('ov').style.display='none';
  document.getElementById('fscore').style.display='none';
  document.getElementById('watchAdBtn').style.display='none';
  document.getElementById('newBest').style.display='none';
  lives=maxLives;adUsed=false;invincible=false;invTimer=0;
  nitroOn=false;nitroT=0;shieldOn=false;shieldT=0;slowOn=false;slowT=0;
  sessionCoins=0;level=1;dashOff=0;
  document.getElementById('hlvl').textContent='LVL 1';
  document.getElementById('hhearts').style.display=gameMode==='race'?'flex':'none';
  updateHearts();updatePower();
  document.getElementById('hcc').textContent=totalCoins;
  document.getElementById('hbst').textContent=bestScore;
  initScenery();pickups=[];
  state={
    running:true,score:0,elapsed:0,speed:MIN_SPD,
    playerLane:1,playerY:H-110,playerX:LANES[1],targetX:LANES[1],
    cars:[],spawnT:0,pSpawnT:0,flash:0,lastTime:performance.now()
  };
  playMusic();
  if(animId)cancelAnimationFrame(animId);
  loop();
}

function loop(){
  if(!state||!state.running)return;
  var now=performance.now();
  var dt=Math.min((now-state.lastTime)/1000,0.05);
  state.lastTime=now;update(dt);draw();
  animId=requestAnimationFrame(loop);
}

function update(dt){
  state.elapsed+=dt;
  var t=Math.min(state.elapsed/RAMP,1);
  var baseSpd=MIN_SPD+(MAX_SPD-MIN_SPD)*(1-Math.pow(1-t,2.5));
  state.speed=nitroOn?baseSpd*1.85:baseSpd;
  state.score+=Math.floor(state.speed*dt*10*(nitroOn?1.5:1));
  checkLevel(state.score);

  if(invincible){invTimer--;if(invTimer<=0)invincible=false;}
  if(nitroOn){nitroT--;if(nitroT<=0)nitroOn=false;updatePower();}
  if(shieldOn){shieldT--;if(shieldT<=0)shieldOn=false;updatePower();}
  if(slowOn){slowT--;if(slowT<=0)slowOn=false;updatePower();}

  state.spawnT++;
  var intv=Math.max(20,78-state.elapsed*0.5);
  if(state.spawnT>=intv){
    var lane=Math.floor(Math.random()*LC);
    var vt=VTYPES[Math.floor(Math.random()*VTYPES.length)];
    var spd=slowOn?state.speed*0.1:state.speed*(0.28+Math.random()*0.5);
    state.cars.push({lane:lane,x:LANES[lane],y:-110,col:vt.col,style:vt.style,spd:spd});
    state.spawnT=0;
  }
  state.pSpawnT+=dt;
  if(state.pSpawnT>=1.7){state.pSpawnT=0;if(Math.random()>0.12)spawnPickup();}

  state.targetX=LANES[state.playerLane];
  state.playerX+=(state.targetX-state.playerX)*0.16;
  var px=state.speed*60*dt;
  dashOff=(dashOff+px)%44;
  updateScenery(px);
  updatePickups(px);
  for(var i=0;i<state.cars.length;i++)state.cars[i].y+=px-(slowOn?state.cars[i].spd*0.12:state.cars[i].spd)*dt*60*0.5;
  state.cars=state.cars.filter(function(c){return c.y<H+140;});

  checkPickups(state.playerX,state.playerY);

  if(!invincible&&!shieldOn&&gameMode==='race'){
    for(var j=0;j<state.cars.length;j++){
      var c=state.cars[j];
      var cw=c.style==='bus'?44:36,ch=c.style==='bus'?92:62;
      if(Math.abs(state.playerX-c.x)<(38+cw)/2-6&&Math.abs(state.playerY-c.y)<(66+ch)/2-6){onCrash();return;}
    }
  }
  if(state.flash>0)state.flash--;

  var sp=(baseSpd-MIN_SPD)/(MAX_SPD-MIN_SPD);
  if(bgMusic&&!muted)bgMusic.volume=Math.min(0.8,0.38+sp*0.26+(nitroOn?0.15:0));

  var pct=Math.min(((baseSpd-MIN_SPD)/(MAX_SPD-MIN_SPD))*100,100);
  document.getElementById('sfill').style.width=pct.toFixed(1)+'%';
  document.getElementById('hsc').textContent=state.score;
  document.getElementById('htim').textContent=Math.floor(state.elapsed)+'s';
  document.getElementById('hbst').textContent=bestScore;
}

function draw(){
  drawRoad();
  drawScenery();
  drawPickups();
  for(var i=0;i<state.cars.length;i++){var c=state.cars[i];c.x=LANES[c.lane];drawVehicle(c.x,c.y,c.col,c.style);}
  if(state.flash>0){ctx.fillStyle='rgba(255,40,40,'+(state.flash/18*0.48)+')';ctx.fillRect(0,0,W,H);}
  if(nitroOn){
    ctx.fillStyle='rgba(0,229,255,0.05)';ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(0,229,255,0.1)';ctx.lineWidth=1;
    for(var sl=0;sl<6;sl++){var slx=RL+Math.random()*RW;ctx.beginPath();ctx.moveTo(slx,0);ctx.lineTo(slx+(Math.random()-0.5)*15,H);ctx.stroke();}
  }
  drawPlayer(state.playerX,state.playerY);
  // Drag hint first 3s
  if(state.elapsed<3){
    var a=Math.max(0,1-state.elapsed/3);
    ctx.fillStyle='rgba(0,0,0,'+a*0.6+')';ctx.fillRect(state.playerX-52,state.playerY-28,104,17);
    ctx.fillStyle='rgba(255,255,255,'+a+')';ctx.font='9px Orbitron,Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('👆 DRAG TO STEER',state.playerX,state.playerY-20);
  }
}

function onCrash(){
  sfxCrash();lives--;updateHearts();state.flash=18;
  if(lives<=0){gameOver();}
  else{
    beep(300,'sine',0.28,0.28);beep(200,'sine',0.3,0.22,0.1);
    showPopup('💔 -1 HEART','#ff3b5c');
    state.running=false;if(animId){cancelAnimationFrame(animId);animId=null;}
    setTimeout(function(){if(!state)return;state.running=true;state.cars=[];invincible=true;invTimer=180;state.lastTime=performance.now();loop();},600);
  }
}

function gameOver(){
  state.running=false;if(animId){cancelAnimationFrame(animId);animId=null;}
  stopMusic();
  var isNew=state.score>bestScore;
  if(isNew){bestScore=state.score;saveAll();}
  document.getElementById('ov').style.display='flex';
  document.getElementById('ovSc').textContent=state.score;
  document.getElementById('ovBst').textContent=bestScore;
  document.getElementById('ovLvl').textContent=level;
  if(isNew)document.getElementById('newBest').style.display='block';
  var fs=document.getElementById('fscore');
  fs.style.display='block';
  fs.innerHTML='<span style="color:rgba(255,255,255,0.4);font-size:9px;letter-spacing:1px;">THIS RUN</span><br>'+Math.floor(state.elapsed)+'s survived · 🪙+'+sessionCoins+' · LVL '+level;
  if(!adUsed&&gameMode==='race')document.getElementById('watchAdBtn').style.display='block';
  document.getElementById('startBtn').textContent='▶ PLAY AGAIN';
  document.getElementById('hbst').textContent=bestScore;
}
</script>
</body>
