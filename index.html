<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Turbo Highway</title>
<meta name="theme-color" content="#00e5ff">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:Arial,sans-serif;overflow:hidden;touch-action:none;}
#gameWrapper{width:100%;max-width:440px;user-select:none;position:relative;}
#gameCanvas{display:block;width:100%;}
#ui{position:absolute;top:0;left:0;width:100%;padding:6px 10px;display:flex;justify-content:space-between;align-items:center;pointer-events:none;gap:4px;}
.stat{color:#fff;font-size:10px;font-weight:700;text-shadow:0 1px 6px #000;white-space:nowrap;}
.stat span{font-size:14px;display:block;}
#hearts{display:flex;gap:2px;align-items:center;}
.heart{font-size:16px;transition:all 0.3s;filter:drop-shadow(0 0 4px #ff4444);}
.heart.lost{filter:none;opacity:0.2;}
#coinUI{display:flex;align-items:center;gap:3px;background:rgba(0,0,0,0.5);border-radius:20px;padding:2px 7px;border:1px solid #f5a623;font-size:12px;font-weight:700;color:#f5a623;white-space:nowrap;}
#powerUI{display:flex;gap:3px;align-items:center;min-width:60px;justify-content:flex-end;}
.picon{font-size:14px;opacity:0.3;transition:opacity 0.3s;}
.picon.active{opacity:1;filter:drop-shadow(0 0 5px #fff);}
#speedBar{position:absolute;bottom:0;left:0;width:100%;height:4px;background:#222;pointer-events:none;}
#speedFill{height:100%;width:0%;background:#00e5ff;}
#nitroBg{position:absolute;inset:0;pointer-events:none;opacity:0;background:linear-gradient(to bottom,rgba(0,229,255,0.08),transparent);transition:opacity 0.3s;}
/* overlay */
#overlay{position:absolute;inset:0;background:rgba(0,0,0,0.88);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;color:#fff;overflow-y:auto;padding:12px;}
#overlay h2{font-size:22px;font-weight:900;letter-spacing:3px;color:#00e5ff;text-shadow:0 0 20px #00e5ff88;}
.hint{font-size:10px;color:#666;text-align:center;}
#startBtn{background:#e24b4a;color:#fff;border:none;border-radius:10px;padding:12px 38px;font-size:15px;font-weight:700;cursor:pointer;}
#startBtn:active{transform:scale(0.97);}
#shopBtn{background:transparent;color:#f5a623;border:2px solid #f5a623;border-radius:10px;padding:9px 26px;font-size:13px;font-weight:700;cursor:pointer;}
#finalScore{font-size:13px;color:#e24b4a;font-weight:700;text-align:center;line-height:1.6;}
#watchAdBtn{background:#f5a623;color:#111;border:none;border-radius:8px;padding:8px 20px;font-size:12px;font-weight:700;cursor:pointer;display:none;}
#muteBtn{position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.5);border:1px solid #444;border-radius:6px;color:#aaa;font-size:11px;padding:3px 7px;cursor:pointer;z-index:10;}
/* ad */
#adOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.93);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#fff;gap:12px;}
.ad-box{background:#1e1e1e;border:1px solid #333;border-radius:12px;width:280px;padding:20px;text-align:center;}
.ad-box h3{font-size:15px;margin-bottom:5px;color:#f5a623;}
.ad-box p{font-size:11px;color:#aaa;margin-bottom:12px;}
#adTimer{font-size:28px;font-weight:700;color:#00e5ff;}
#adSkipBtn{background:#333;color:#aaa;border:none;border-radius:6px;padding:7px 14px;font-size:11px;cursor:not-allowed;margin-top:8px;display:block;width:100%;}
#adSkipBtn.ready{background:#00e5ff;color:#111;cursor:pointer;font-weight:700;}
#adRewardMsg{color:#1D9E75;font-size:12px;font-weight:700;display:none;margin-top:5px;}
/* popup */
#popup{position:absolute;left:50%;transform:translateX(-50%);top:36%;font-size:20px;font-weight:700;opacity:0;pointer-events:none;z-index:20;white-space:nowrap;text-align:center;line-height:1.3;}
/* shop */
#shopOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.96);display:none;flex-direction:column;align-items:center;z-index:8888;color:#fff;overflow-y:auto;padding:14px;}
#shopOverlay h2{font-size:18px;font-weight:900;color:#f5a623;margin-bottom:3px;letter-spacing:2px;}
.shop-coins{font-size:13px;color:#f5a623;margin-bottom:10px;}
.shop-section{width:100%;max-width:400px;margin-bottom:12px;}
.shop-section h3{font-size:11px;color:#aaa;letter-spacing:1px;margin-bottom:6px;text-transform:uppercase;}
.shop-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.shop-item{background:#1a1a1a;border:2px solid #333;border-radius:9px;padding:8px 5px;text-align:center;cursor:pointer;transition:border 0.2s;}
.shop-item.owned{border-color:#1D9E75;}
.shop-item.selected{border-color:#00e5ff;background:#001520;}
.shop-item canvas{display:block;margin:0 auto 4px;}
.shop-item .iname{font-size:10px;font-weight:700;color:#fff;}
.shop-item .iprice{font-size:10px;color:#f5a623;margin-top:2px;}
.shop-item .istatus{font-size:9px;margin-top:2px;}
.shop-item.owned .istatus{color:#1D9E75;}
.shop-item.selected .istatus{color:#00e5ff;}
.shop-item:not(.owned):not(.selected) .istatus{color:#777;}
#closeShopBtn{background:#e24b4a;color:#fff;border:none;border-radius:8px;padding:9px 30px;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px;margin-bottom:10px;}
/* power bar */
#powerBarWrap{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:120px;height:6px;background:rgba(0,0,0,0.5);border-radius:3px;border:1px solid #333;pointer-events:none;display:none;}
#powerBarFill{height:100%;width:100%;border-radius:3px;background:#00e5ff;transition:width 0.1s;}
</style>
</head>
<body>

<div id="adOverlay">
  <div class="ad-box">
    <h3>Watch an ad</h3>
    <p>Watch a short ad to get 1 heart back!</p>
    <div id="adTimer">5</div>
    <div id="adRewardMsg">❤️ +1 Heart!</div>
    <button id="adSkipBtn">Wait 5s...</button>
  </div>
</div>

<div id="shopOverlay">
  <h2>🛒 SHOP</h2>
  <div class="shop-coins">🪙 <span id="shopCoins">0</span> coins</div>
  <div class="shop-section"><h3>🚗 Cars</h3><div class="shop-grid" id="carGrid"></div></div>
  <div class="shop-section"><h3>🛣️ Roads</h3><div class="shop-grid" id="roadGrid"></div></div>
  <button id="closeShopBtn">✕ Close</button>
</div>

<div id="gameWrapper">
  <canvas id="gameCanvas" width="420" height="540"></canvas>
  <div id="nitroBg"></div>
  <div id="ui">
    <div class="stat">SCORE<span id="scoreDisplay">0</span></div>
    <div id="hearts">
      <span class="heart" id="h1">❤️</span>
      <span class="heart" id="h2">❤️</span>
      <span class="heart" id="h3">❤️</span>
    </div>
    <div id="coinUI">🪙<span id="coinDisplay">0</span></div>
    <div id="powerUI">
      <span class="picon" id="pi-shield" title="Shield">🛡️</span>
      <span class="picon" id="pi-nitro" title="Nitro">⚡</span>
      <span class="picon" id="pi-slow" title="Slow">🐢</span>
    </div>
    <div class="stat" style="text-align:right">BEST<span id="bestDisplay">0</span></div>
  </div>
  <button id="muteBtn">🔊</button>
  <div id="speedBar"><div id="speedFill"></div></div>
  <div id="powerBarWrap"><div id="powerBarFill"></div></div>
  <div id="popup"></div>
  <div id="overlay">
    <h2>TURBO HIGHWAY</h2>
    <div style="font-size:22px;">❤️❤️❤️</div>
    <p class="hint">🪙 coins &nbsp;·&nbsp; 📦 mystery boxes &nbsp;·&nbsp; ⚡ nitro &nbsp;·&nbsp; 🕳️ holes</p>
    <div id="finalScore" style="display:none"></div>
    <button id="watchAdBtn">❤️ Watch Ad — Get Heart Back</button>
    <button id="startBtn">▶ START</button>
    <button id="shopBtn">🛒 SHOP</button>
    <p class="hint">👆 drag your car left &amp; right to steer</p>
  </div>
</div>

<script>
// ── Manifest + SW ──
(function(){
  var mf={name:"Turbo Highway",short_name:"TurboHwy",start_url:"/turbo-highway/",scope:"/turbo-highway/",display:"fullscreen",orientation:"portrait",background_color:"#0a0a0a",theme_color:"#00e5ff",icons:[{src:"https://placehold.co/192x192/f5a623/111?text=TH",sizes:"192x192",type:"image/png",purpose:"any maskable"},{src:"https://placehold.co/512x512/f5a623/111?text=TH",sizes:"512x512",type:"image/png",purpose:"any maskable"}]};
  var ml=document.createElement('link');ml.rel='manifest';ml.href=URL.createObjectURL(new Blob([JSON.stringify(mf)],{type:'application/json'}));document.head.appendChild(ml);
  if('serviceWorker' in navigator){
    var sw='const C="th-v8";self.addEventListener("install",function(e){e.waitUntil(caches.open(C).then(function(c){return c.addAll(["./"]);}));self.skipWaiting();});self.addEventListener("activate",function(e){e.waitUntil(caches.keys().then(function(ks){return Promise.all(ks.filter(function(k){return k!==C;}).map(function(k){return caches.delete(k);}));}));self.clients.claim();});self.addEventListener("fetch",function(e){e.respondWith(caches.match(e.request).then(function(r){return r||fetch(e.request);}));});';
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(function(){});
  }
})();

// ── Canvas ──
var canvas=document.getElementById('gameCanvas');
var ctx=canvas.getContext('2d');
var W=420,H=540,RL=80,RR=340,RW=260,LC=3,LW=RW/LC;
var LANES=[0,1,2].map(function(i){return RL+LW*i+LW/2;});
var MIN_SPD=3,MAX_SPD=20,RAMP=90;

// ── Persistent ──
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function load(k,d){try{var v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch(e){return d;}}

// ── Shop data ──
var CARS=[
  {id:'cyan',  name:'Cyber',   price:0,   col:'#00ccee',acc:'#005577',owned:true},
  {id:'red',   name:'Devil',   price:80,  col:'#e24b4a',acc:'#7a0000',owned:false},
  {id:'gold',  name:'Gold',    price:150, col:'#f5a623',acc:'#7a4a00',owned:false},
  {id:'purple',name:'Ghost',   price:250, col:'#9b59b6',acc:'#4a1a5a',owned:false},
  {id:'green', name:'Viper',   price:400, col:'#27ae60',acc:'#0a4a20',owned:false},
  {id:'black', name:'Shadow',  price:600, col:'#444',   acc:'#111',   owned:false},
];
var ROADS=[
  {id:'city',   name:'City',   price:0,   grass:'#1a321a',road:'#363636',line:'#e8cc00',owned:true},
  {id:'desert', name:'Desert', price:100, grass:'#7a5c2a',road:'#c8a96e',line:'#fff',   owned:false},
  {id:'snow',   name:'Snow',   price:200, grass:'#c8dde8',road:'#dde8ee',line:'#4499cc',owned:false},
  {id:'neon',   name:'Neon',   price:350, grass:'#0a0a1a',road:'#1a0a2e',line:'#ff00ff',owned:false},
  {id:'lava',   name:'Lava',   price:500, grass:'#3a0a00',road:'#1a0a00',line:'#ff4400',owned:false},
  {id:'galaxy', name:'Galaxy', price:800, grass:'#050510',road:'#0a0a20',line:'#8844ff',owned:false},
];

var totalCoins=load('coins',0);
var selectedCar=load('car','cyan');
var selectedRoad=load('road','city');
var ownedCars=load('ownedCars',['cyan']);
var ownedRoads=load('ownedRoads',['city']);
CARS.forEach(function(c){c.owned=ownedCars.indexOf(c.id)>=0;});
ROADS.forEach(function(r){r.owned=ownedRoads.indexOf(r.id)>=0;});

function saveShop(){
  save('coins',totalCoins);save('car',selectedCar);save('road',selectedRoad);
  save('ownedCars',CARS.filter(function(c){return c.owned;}).map(function(c){return c.id;}));
  save('ownedRoads',ROADS.filter(function(r){return r.owned;}).map(function(r){return r.id;}));
}
function getCar(){return CARS.find(function(c){return c.id===selectedCar;})||CARS[0];}
function getRoad(){return ROADS.find(function(r){return r.id===selectedRoad;})||ROADS[0];}

// ── State ──
var state=null,animId=null,best=load('best',0),muted=false;
var lives=3,maxLives=3,adUsed=false;
var invincible=false,invTimer=0;
var nitroActive=false,nitroTimer=0;
var shieldActive=false,shieldTimer=0;
var slowActive=false,slowTimer=0;
var sessionCoins=0;

// ── Power timers ──
var POWER_DUR=180; // frames

// ── Music ──
var bgMusic=null;
function initMusic(){if(bgMusic)return;bgMusic=new Audio('music.mp3');bgMusic.loop=true;bgMusic.volume=0.5;}
function playMusic(){if(!bgMusic||muted)return;bgMusic.currentTime=0;var p=bgMusic.play();if(p&&p.catch)p.catch(function(){});}
function stopMusic(){if(!bgMusic)return;bgMusic.pause();bgMusic.currentTime=0;}

// ── SFX ──
var AC=null;
function initAC(){if(AC)return;try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function resumeAC(){if(AC&&AC.state==='suspended')AC.resume();}
function beep(freq,type,dur,vol,delay){
  if(!AC)return;resumeAC();
  var t=AC.currentTime+(delay||0);
  var o=AC.createOscillator(),g=AC.createGain();
  o.type=type||'sine';o.frequency.value=freq;o.connect(g);g.connect(AC.destination);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol||0.35,t+0.01);
  g.gain.linearRampToValueAtTime(0,t+dur);o.start(t);o.stop(t+dur+0.02);
}
function playCoin(){[880,1100,1320].forEach(function(f,i){beep(f,'sine',0.1,0.15,i*0.05);});}
function playCrash(){
  beep(200,'sawtooth',0.35,0.7);
  if(!AC)return;resumeAC();
  var now=AC.currentTime;
  var len=Math.floor(AC.sampleRate*0.3),buf=AC.createBuffer(1,len,AC.sampleRate);
  var d=buf.getChannelData(0);for(var i=0;i<len;i++)d[i]=Math.random()*2-1;
  var src=AC.createBufferSource();src.buffer=buf;
  var g=AC.createGain();src.connect(g);g.connect(AC.destination);
  g.gain.setValueAtTime(0.4,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.3);
  src.start(now);src.stop(now+0.32);
}
function playBox(){[330,440,550,660].forEach(function(f,i){beep(f,'square',0.12,0.18,i*0.07);});}
function playNitro(){beep(150,'sawtooth',0.5,0.3);beep(300,'sawtooth',0.5,0.2,0.05);}
function playHole(){beep(100,'sine',0.4,0.5);beep(60,'sine',0.5,0.4,0.1);}
function playHeart(){[523,659,784].forEach(function(f,i){beep(f,'sine',0.15,0.3,i*0.1);});}
function playSlow(){beep(200,'triangle',0.4,0.25);beep(180,'triangle',0.4,0.2,0.1);}
function playShield(){beep(600,'triangle',0.1,0.2);beep(800,'triangle',0.1,0.18,0.08);beep(1000,'triangle',0.15,0.15,0.16);}

// ── Popup ──
function showPopup(text,color){
  var p=document.getElementById('popup');
  p.innerHTML=text;p.style.color=color||'#f5a623';
  p.style.textShadow='0 0 12px '+(color||'#f5a623');
  p.style.transition='none';p.style.opacity='1';p.style.top='33%';
  setTimeout(function(){p.style.transition='opacity 1s,top 1s';p.style.opacity='0';p.style.top='15%';},80);
}
function updatePowerIcons(){
  document.getElementById('pi-shield').className='picon'+(shieldActive?' active':'');
  document.getElementById('pi-nitro').className='picon'+(nitroActive?' active':'');
  document.getElementById('pi-slow').className='picon'+(slowActive?' active':'');
  // power bar
  var wrap=document.getElementById('powerBarWrap');
  var fill=document.getElementById('powerBarFill');
  var activeT=nitroActive?nitroTimer:shieldActive?shieldTimer:slowActive?slowTimer:0;
  if(activeT>0){
    wrap.style.display='block';
    fill.style.width=Math.round(activeT/POWER_DUR*100)+'%';
    fill.style.background=nitroActive?'#00e5ff':shieldActive?'#f5a623':slowActive?'#1D9E75':'#fff';
  } else { wrap.style.display='none'; }
  document.getElementById('nitroBg').style.opacity=nitroActive?'1':'0';
}
function updateHeartsUI(){
  for(var i=1;i<=maxLives;i++){
    var el=document.getElementById('h'+i);
    if(el){if(i<=lives)el.classList.remove('lost');else el.classList.add('lost');}
  }
}

// ── Controls ──
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A'){initAC();resumeAC();if(state&&state.running)state.playerLane=Math.max(0,state.playerLane-1);}
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D'){initAC();resumeAC();if(state&&state.running)state.playerLane=Math.min(LC-1,state.playerLane+1);}
});
document.getElementById('muteBtn').addEventListener('click',function(){
  muted=!muted;if(bgMusic)bgMusic.volume=muted?0:0.5;
  document.getElementById('muteBtn').textContent=muted?'🔇':'🔊';
});

// ── Ad ──
function showAd(cb){
  var ov=document.getElementById('adOverlay'),tim=document.getElementById('adTimer');
  var skip=document.getElementById('adSkipBtn'),rm=document.getElementById('adRewardMsg');
  ov.style.display='flex';rm.style.display='none';skip.className='';skip.disabled=true;skip.textContent='Wait 5s...';
  var t=5;tim.textContent=t;
  var iv=setInterval(function(){
    t--;tim.textContent=t;if(t<=0){
      clearInterval(iv);skip.textContent='❤️ Claim Heart!';skip.className='ready';skip.disabled=false;
      skip.onclick=function(){rm.style.display='block';setTimeout(function(){ov.style.display='none';if(cb)cb();},800);};
    }
  },1000);
}
document.getElementById('watchAdBtn').addEventListener('click',function(){
  showAd(function(){
    adUsed=true;lives=Math.min(maxLives,lives+1);updateHeartsUI();
    showPopup('❤️ +1 Heart!','#ff4444');
    document.getElementById('watchAdBtn').style.display='none';
    document.getElementById('overlay').style.display='none';
    document.getElementById('finalScore').style.display='none';
    state.running=true;state.cars=[];invincible=true;invTimer=150;
    playMusic();loop();
  });
});

// ── Shop ──
document.getElementById('shopBtn').addEventListener('click',openShop);
document.getElementById('closeShopBtn').addEventListener('click',closeShop);
function openShop(){
  document.getElementById('shopCoins').textContent=totalCoins;
  buildCarGrid();buildRoadGrid();
  document.getElementById('shopOverlay').style.display='flex';
}
function closeShop(){document.getElementById('shopOverlay').style.display='none';}

function drawCarPrev(cv,car){
  var c=cv.getContext('2d');cv.width=56;cv.height=64;c.clearRect(0,0,56,64);
  var x=28,y=32,w=26,h=44;
  var g=c.createLinearGradient(x-w/2,y,x+w/2,y);
  g.addColorStop(0,car.acc);g.addColorStop(0.5,car.col);g.addColorStop(1,car.acc);
  c.fillStyle=g;c.beginPath();c.moveTo(x-w/2+4,y-h/2);c.lineTo(x+w/2-4,y-h/2);
  c.quadraticCurveTo(x+w/2,y-h/2,x+w/2,y-h/2+4);c.lineTo(x+w/2,y+h/2-4);
  c.quadraticCurveTo(x+w/2,y+h/2,x+w/2-4,y+h/2);c.lineTo(x-w/2+4,y+h/2);
  c.quadraticCurveTo(x-w/2,y+h/2,x-w/2,y+h/2-4);c.lineTo(x-w/2,y-h/2+4);
  c.quadraticCurveTo(x-w/2,y-h/2,x-w/2+4,y-h/2);c.closePath();c.fill();
  c.fillStyle='rgba(0,0,0,0.38)';c.fillRect(x-w/2+4,y-h/2+8,w-8,h*0.3);
  c.fillStyle='rgba(200,245,255,0.4)';c.fillRect(x-w/2+5,y-h/2+9,w-10,h*0.18);
  c.fillStyle='#ffffa0';c.beginPath();c.ellipse(x-6,y+h/2-5,3,2,0,0,Math.PI*2);c.fill();
  c.beginPath();c.ellipse(x+6,y+h/2-5,3,2,0,0,Math.PI*2);c.fill();
  c.fillStyle='#ff1a00';c.fillRect(x-w/2+2,y-h/2+2,5,3);c.fillRect(x+w/2-7,y-h/2+2,5,3);
  c.fillStyle='#111';c.fillRect(x-w/2-3,y-10,5,8);c.fillRect(x+w/2-2,y-10,5,8);
  c.fillRect(x-w/2-3,y+3,5,8);c.fillRect(x+w/2-2,y+3,5,8);
}
function drawRoadPrev(cv,road){
  var c=cv.getContext('2d');cv.width=56;cv.height=64;c.clearRect(0,0,56,64);
  c.fillStyle=road.grass;c.fillRect(0,0,56,64);
  c.fillStyle=road.road;c.fillRect(10,0,36,64);
  c.strokeStyle=road.line;c.lineWidth=1.5;c.setLineDash([5,4]);
  c.beginPath();c.moveTo(22,0);c.lineTo(22,64);c.stroke();
  c.beginPath();c.moveTo(34,0);c.lineTo(34,64);c.stroke();
  c.setLineDash([]);c.strokeStyle='#ccc';c.lineWidth=1.5;
  c.beginPath();c.moveTo(10,0);c.lineTo(10,64);c.stroke();
  c.beginPath();c.moveTo(46,0);c.lineTo(46,64);c.stroke();
  if(road.id==='neon'||road.id==='galaxy'||road.id==='lava'){

function buildGrid(gridId,items,selId,onBuy){
  var grid=document.getElementById(gridId);grid.innerHTML='';
  items.forEach(function(item){
    var div=document.createElement('div');
    div.className='shop-item'+(item.id===selId?' selected':item.owned?' owned':'');
    var cv=document.createElement('canvas');
    if(gridId==='carGrid')drawCarPrev(cv,item);else drawRoadPrev(cv,item);
    div.appendChild(cv);
    var nm=document.createElement('div');nm.className='iname';nm.textContent=item.name;div.appendChild(nm);
    var pr=document.createElement('div');pr.className='iprice';pr.textContent=item.owned?'':'🪙'+item.price;div.appendChild(pr);
    var st=document.createElement('div');st.className='istatus';
    if(item.id===selId)st.textContent='✔ Active';
    else if(item.owned)st.textContent='Tap select';
    else if(totalCoins>=item.price)st.textContent='Buy now!';
    else st.textContent='Need '+(item.price-totalCoins)+'🪙';
    div.appendChild(st);
    div.addEventListener('click',function(){onBuy(item);});
    grid.appendChild(div);
  });
}
function buildCarGrid(){
  buildGrid('carGrid',CARS,selectedCar,function(car){
    if(car.id===selectedCar)return;
    if(car.owned){selectedCar=car.id;saveShop();buildCarGrid();}
    else if(totalCoins>=car.price){totalCoins-=car.price;car.owned=true;selectedCar=car.id;document.getElementById('shopCoins').textContent=totalCoins;saveShop();buildCarGrid();showPopup('🚗 Unlocked!','#00e5ff');}
    else{showPopup('Need '+(car.price-totalCoins)+' more 🪙','#e24b4a');}
  });
}
function buildRoadGrid(){
  buildGrid('roadGrid',ROADS,selectedRoad,function(road){
    if(road.id===selectedRoad)return;
    if(road.owned){selectedRoad=road.id;saveShop();buildRoadGrid();}
    else if(totalCoins>=road.price){totalCoins-=road.price;road.owned=true;selectedRoad=road.id;document.getElementById('shopCoins').textContent=totalCoins;saveShop();buildRoadGrid();showPopup('🛣️ Unlocked!','#00e5ff');}

var scenery=[];
function initScenery(){
  scenery=[];var types=[0,0,1,2,2,3,3,4];

function drawTree(x,y,s,ph){
  ctx.fillStyle='#5a3815';ctx.fillRect(x-3*s,y,6*s,16*s);
  var hue=118+Math.sin(ph)*5;
  ctx.fillStyle='hsl('+hue+',52%,'+(26+Math.sin(ph)*4)+'%)';ctx.beginPath();ctx.ellipse(x,y-8*s,15*s,19*s,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='hsl('+(hue+5)+',57%,'+(33+Math.sin(ph)*4)+'%)';ctx.beginPath();ctx.ellipse(x,y-19*s,11*s,14*s,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='hsl('+(hue+10)+',62%,'+(40+Math.sin(ph)*4)+'%)';ctx.beginPath();ctx.ellipse(x,y-28*s,8*s,11*s,0,0,Math.PI*2);ctx.fill();
}
function drawPalm(x,y,s,ph){
  ctx.strokeStyle='#7a5c2a';ctx.lineWidth=4*s;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x,y+4*s);ctx.quadraticCurveTo(x+5*s,y-10*s,x+2*s,y-30*s);ctx.stroke();
  for(var a=0;a<6;a++){
    var ang=-0.4+a*(Math.PI/3)+Math.sin(ph+a*0.6)*0.18;
    ctx.strokeStyle='hsl('+(106+a*3)+',55%,32%)';ctx.lineWidth=2.5*s;
    ctx.beginPath();ctx.moveTo(x+2*s,y-30*s);ctx.quadraticCurveTo(x+Math.cos(ang)*16*s+2*s,y-30*s+Math.sin(ang)*7*s,x+Math.cos(ang)*29*s+2*s,y-30*s+Math.sin(ang)*14*s);ctx.stroke();
  }
}
function drawBush(x,y,s){
  ctx.fillStyle='#27501a';ctx.beginPath();ctx.ellipse(x,y,13*s,8*s,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#35701f';ctx.beginPath();ctx.ellipse(x-5*s,y-4*s,8*s,6*s,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+5*s,y-4*s,8*s,6*s,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#428a22';ctx.beginPath();ctx.ellipse(x,y-7*s,8*s,6*s,0,0,Math.PI*2);ctx.fill();
}
function drawBuilding(x,y,s,side){
  var w=Math.max(20,Math.floor(25*s)),h=Math.max(30,Math.floor(55*s+s*18));
  var bx=side==='L'?x-w:x,hue=200+s*20;
  ctx.fillStyle='hsl('+hue+',16%,'+(20+s*8)+'%)';ctx.fillRect(bx,y-h,w,h);
  var ws=Math.max(3,Math.floor(4*s)),wg=Math.floor(8*s);
  for(var wy=y-h+5;wy<y-5;wy+=wg)for(var wx=bx+3;wx<bx+w-3;wx+=wg){
    ctx.fillStyle=(Math.sin(wx*0.31+wy*0.19)>-0.2)?'rgba(255,235,100,0.72)':'rgba(60,90,130,0.25)';
    ctx.fillRect(wx,wy,ws,ws);
  }
  ctx.fillStyle='hsl('+hue+',12%,30%)';ctx.fillRect(bx,y-h-3,w,4);
}
function drawLamp(x,y,s,side){
  ctx.strokeStyle='#777';ctx.lineWidth=1.8*s;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y-24*s);ctx.stroke();
  var ax=side==='L'?x+7*s:x-7*s;
  ctx.beginPath();ctx.moveTo(x,y-24*s);ctx.lineTo(ax,y-24*s);ctx.stroke();
  ctx.fillStyle='rgba(255,240,120,0.88)';ctx.shadowColor='rgba(255,240,100,0.5)';ctx.shadowBlur=5;
  ctx.beginPath();ctx.ellipse(ax,y-24*s,3.5*s,2*s,0,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
}
function updateScenery(px){for(var i=0;i<scenery.length;i++){scenery[i].y+=px*0.52;scenery[i].ph+=0.016;if(scenery[i].y>H+100)scenery[i].y=-100;}}
function drawScenery(){
  for(var i=0;i<scenery.length;i++){
    var sc=scenery[i];
    if(sc.type===0)drawTree(sc.x,sc.y,sc.sc,sc.ph);
    else if(sc.type===1)drawPalm(sc.x,sc.y,sc.sc,sc.ph);
    else if(sc.type===2)drawBush(sc.x,sc.y,sc.sc);
    else if(sc.type===3)drawBuilding(sc.x,sc.y,sc.sc,sc.side);
    else drawLamp(sc.x,sc.y,sc.sc,sc.side);
  }
}

// ── Road ──
function shHex(hex,amt){
  hex=hex.replace('#','');if(hex.length===3)hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  return '#'+['01','23','45'].map(function(sl){return Math.max(0,Math.min(255,parseInt(hex.slice(+sl[0],+sl[1]+1),16)+amt)).toString(16).padStart(2,'0');}).join('');
}
function drawRoad(doff){
  var road=getRoad();
  ctx.fillStyle='#141a14';ctx.fillRect(0,0,W,H);
  ctx.fillStyle=road.grass;ctx.fillRect(0,0,RL,H);ctx.fillRect(RR,0,W-RR,H);
  ctx.fillStyle='#2c2820';ctx.fillRect(RL-14,0,14,H);ctx.fillRect(RR,0,14,H);
  ctx.fillStyle='#38342c';ctx.fillRect(RL-16,0,3,H);ctx.fillRect(RR+13,0,3,H);
  var rg=ctx.createLinearGradient(RL,0,RR,0);
  var rd=road.road;
  rg.addColorStop(0,shHex(rd,-18));rg.addColorStop(0.5,rd);rg.addColorStop(1,shHex(rd,-18));
  ctx.fillStyle=rg;ctx.fillRect(RL,0,RW,H);
  if(road.id==='neon'){{ctx.fillStyle='rgba(80,0,120,0.15)';ctx.fillRect(RL,0,RW,H);}}
  if(road.id==='lava'){ctx.fillStyle='rgba(60,0,0,0.2)';ctx.fillRect(RL,0,RW,H);}
  if(road.id==='galaxy'){ctx.fillStyle='rgba(10,0,30,0.3)';ctx.fillRect(RL,0,RW,H);}
  ctx.strokeStyle='#ccc';ctx.lineWidth=2.5;ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(RL,0);ctx.lineTo(RL,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(RR,0);ctx.lineTo(RR,H);ctx.stroke();
  if(road.id==='neon'||road.id==='galaxy'||road.id==='lava'){ctx.shadowColor=road.line;ctx.shadowBlur=8;}
  ctx.strokeStyle=road.line;ctx.lineWidth=2;ctx.setLineDash([26,18]);ctx.lineDashOffset=-doff;
  for(var i=1;i<LC;i++){var lx=RL+LW*i;ctx.beginPath();ctx.moveTo(lx,0);ctx.lineTo(lx,H);ctx.stroke();}
  ctx.setLineDash([]);ctx.shadowBlur=0;
}

var pickups=[];
var PICKUP_TYPES=['coin','coin','coin','coin','box','box','nitro','hole','hole','slow'];

function spawnPickup(){
  var lane=Math.floor(Math.random()*LC);

function updatePickups(px){
  for(var i=0;i<pickups.length;i++){pickups[i].y+=px;pickups[i].anim+=0.08;}

function drawPickups(){
  for(var i=0;i<pickups.length;i++){
    var p=pickups[i];
    var cy=p.y+Math.sin(p.anim)*4;
    if(p.type==='coin'){
      ctx.shadowColor='#f5a623';ctx.shadowBlur=10;
      ctx.fillStyle='#f5a623';ctx.beginPath();ctx.ellipse(p.x,cy,11,11,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffe066';ctx.beginPath();ctx.ellipse(p.x-2,cy-2,5,5,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#9a6000';ctx.font='bold 9px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('$',p.x,cy);ctx.shadowBlur=0;
    }
    else if(p.type==='box'){
      var pulse=0.95+Math.sin(p.anim*2)*0.08;
      ctx.save();ctx.translate(p.x,cy);ctx.scale(pulse,pulse);
      // mystery box
      ctx.shadowColor='#cc44ff';ctx.shadowBlur=14;
      ctx.fillStyle='#7a00cc';
      ctx.fillRect(-14,-14,28,28);
      ctx.strokeStyle='#cc44ff';ctx.lineWidth=2;ctx.strokeRect(-14,-14,28,28);
      // ? mark
      ctx.fillStyle='#fff';ctx.font='bold 16px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('?',0,1);
      // stars on corners
      ctx.fillStyle='#ffcc00';ctx.font='8px Arial';
      ctx.fillText('★',-10,-10);ctx.fillText('★',10,-10);
      ctx.shadowBlur=0;ctx.restore();
    }
    else if(p.type==='nitro'){
      ctx.shadowColor='#00e5ff';ctx.shadowBlur=14;
      ctx.fillStyle='#001a2e';ctx.beginPath();ctx.ellipse(p.x,cy,13,18,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#00e5ff';ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(p.x,cy,13,18,0,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle='#00e5ff';ctx.font='bold 14px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('⚡',p.x,cy);ctx.shadowBlur=0;
    }
    else if(p.type==='hole'){
      // dark hole on road
      ctx.shadowColor='#000';ctx.shadowBlur=8;
      var rg2=ctx.createRadialGradient(p.x,cy,2,p.x,cy,16);
      rg2.addColorStop(0,'rgba(0,0,0,0.98)');rg2.addColorStop(0.6,'rgba(20,0,40,0.9)');rg2.addColorStop(1,'rgba(60,0,80,0)');
      ctx.fillStyle=rg2;ctx.beginPath();ctx.ellipse(p.x,cy,16,10,0,0,Math.PI*2);ctx.fill();
      // warning ring
      ctx.strokeStyle='rgba(255,0,0,0.6)';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);
      ctx.beginPath();ctx.ellipse(p.x,cy,16,10,0,0,Math.PI*2);ctx.stroke();
      ctx.setLineDash([]);ctx.shadowBlur=0;
    }
    else if(p.type==='slow'){
      ctx.shadowColor='#1D9E75';ctx.shadowBlur=12;
      ctx.fillStyle='#0a3a20';ctx.beginPath();ctx.ellipse(p.x,cy,13,13,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#1D9E75';ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(p.x,cy,13,13,0,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle='#1D9E75';ctx.font='13px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('🐢',p.x,cy);ctx.shadowBlur=0;
    }
  }
}

function checkPickups(px,py){
  for(var i=0;i<pickups.length;i++){
    var p=pickups[i];
    if(p.done)continue;
    var dx=Math.abs(px-p.x),dy=Math.abs(py-p.y);
    var hitR=p.type==='hole'?20:22;
    if(dx<hitR&&dy<hitR){
      p.done=true;
      onPickup(p.type);
    }
  }
}

function onPickup(type){
  if(type==='coin'){
    sessionCoins++;totalCoins++;saveShop();
    document.getElementById('coinDisplay').textContent=totalCoins;
    playCoin();showPopup('+1 🪙','#f5a623');
  }
  else if(type==='box'){
    playBox();
    var roll=Math.random();
    if(roll<0.35){
      // +1 heart
      if(lives<maxLives){lives++;updateHeartsUI();playHeart();showPopup('📦 +1 ❤️','#ff4444');}
      else{// extra coins instead
        totalCoins+=5;sessionCoins+=5;saveShop();
        document.getElementById('coinDisplay').textContent=totalCoins;
        showPopup('📦 +5 🪙','#f5a623');
      }
    } else if(roll<0.65){
      shieldActive=true;shieldTimer=POWER_DUR;playShield();showPopup('📦 🛡️ Shield!','#f5a623');
    } else if(roll<0.85){
      slowActive=true;slowTimer=POWER_DUR;playSlow();showPopup('📦 🐢 Slow!','#1D9E75');
    } else {
      nitroActive=true;nitroTimer=POWER_DUR;playNitro();showPopup('📦 ⚡ Nitro!','#00e5ff');
    }
    updatePowerIcons();
  }
  else if(type==='nitro'){
    nitroActive=true;nitroTimer=POWER_DUR;playNitro();showPopup('⚡ NITRO!','#00e5ff');updatePowerIcons();
  }
  else if(type==='slow'){
    slowActive=true;slowTimer=POWER_DUR;playSlow();showPopup('🐢 Traffic Slowed!','#1D9E75');updatePowerIcons();
  }
  else if(type==='hole'){
    if(shieldActive){showPopup('🛡️ Blocked!','#f5a623');return;}
    playHole();onCrash();
  }
}

function rRect(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// ── Game ──
function startGame(){
  document.getElementById('overlay').style.display='none';
  document.getElementById('finalScore').style.display='none';
  document.getElementById('watchAdBtn').style.display='none';
  lives=maxLives;adUsed=false;
  invincible=false;invTimer=0;
  nitroActive=false;nitroTimer=0;
  shieldActive=false;shieldTimer=0;
  slowActive=false;slowTimer=0;
  sessionCoins=0;
  updateHeartsUI();updatePowerIcons();
  document.getElementById('coinDisplay').textContent=totalCoins;
  initScenery();pickups=[];
  state={
    running:true,score:0,elapsed:0,speed:MIN_SPD,
    playerLane:1,playerY:H-110,playerX:LANES[1],targetX:LANES[1],
    cars:[],doff:0,spawnT:0,pSpawnT:0,flash:0,lastTime:performance.now()
  };
  playMusic();
  if(animId)cancelAnimationFrame(animId);
  loop();
}

function loop(){
  if(!state||!state.running)return;
  var now=performance.now();
  var dt=Math.min((now-state.lastTime)/1000,0.05);
  state.lastTime=now;update(dt);draw();
  animId=requestAnimationFrame(loop);
}

function update(dt){
  state.elapsed+=dt;
  var t=Math.min(state.elapsed/RAMP,1);
  var baseSpd=MIN_SPD+(MAX_SPD-MIN_SPD)*(1-Math.pow(1-t,2.5));
  state.speed=nitroActive?baseSpd*1.8:baseSpd;
  state.score+=Math.floor(state.speed*dt*10*(nitroActive?1.5:1));

  // power timers
  if(invincible){invTimer--;if(invTimer<=0){invincible=false;}}
  if(nitroActive){nitroTimer--;if(nitroTimer<=0){nitroActive=false;}updatePowerIcons();}
  if(shieldActive){shieldTimer--;if(shieldTimer<=0){shieldActive=false;}updatePowerIcons();}
  if(slowActive){slowTimer--;if(slowTimer<=0){slowActive=false;}updatePowerIcons();}

  // spawn traffic
  state.spawnT++;
  var intv=Math.max(22,80-state.elapsed*0.55);
  if(state.spawnT>=intv){
    var lane=Math.floor(Math.random()*LC);
    var vt=VTYPES[Math.floor(Math.random()*VTYPES.length)];
    var trafficSpd=slowActive?state.speed*0.12:state.speed*(0.28+Math.random()*0.52);
    state.cars.push({lane:lane,x:LANES[lane],y:-110,col:vt.col,style:vt.style,spd:trafficSpd});
    state.spawnT=0;
  }

  // spawn pickups every ~2s
  state.pSpawnT+=dt;
  if(state.pSpawnT>=1.8){state.pSpawnT=0;spawnPickup();}

  state.targetX=LANES[state.playerLane];
  state.playerX+=(state.targetX-state.playerX)*0.17;
  var px=state.speed*60*dt;
  state.doff=(state.doff+px)%44;
  updateScenery(px);
  updatePickups(px);
  for(var i=0;i<state.cars.length;i++)state.cars[i].y+=px-(slowActive?state.cars[i].spd*0.15:state.cars[i].spd)*dt*60*0.5;
  state.cars=state.cars.filter(function(c){return c.y<H+140;});

  checkPickups(state.playerX,state.playerY);

  // collision with traffic
  if(!invincible&&!shieldActive){
    for(var j=0;j<state.cars.length;j++){
      var c=state.cars[j];
      var cw=c.style==='bus'?43:36,ch=c.style==='bus'?90:60;
      if(Math.abs(state.playerX-c.x)<(38+cw)/2-6&&Math.abs(state.playerY-c.y)<(64+ch)/2-6){
        onCrash();return;
      }
    }
  }

  if(state.flash>0)state.flash--;
  var sp=(baseSpd-MIN_SPD)/(MAX_SPD-MIN_SPD);
  if(bgMusic&&!muted)bgMusic.volume=muted?0:Math.min(0.85,0.38+sp*0.28+(nitroActive?0.15:0));

  var pct=Math.min(((baseSpd-MIN_SPD)/(MAX_SPD-MIN_SPD))*100,100);
  document.getElementById('speedFill').style.width=pct.toFixed(1)+'%';
  document.getElementById('speedFill').style.background=nitroActive?'#00e5ff':'rgb('+Math.round(pct*2.55)+','+Math.round((100-pct)*2)+',80)';
  document.getElementById('scoreDisplay').textContent=state.score;
  document.getElementById('bestDisplay').textContent=best;
}

function onCrash(){
  playCrash();lives--;updateHeartsUI();state.flash=18;
  if(lives<=0){gameOver();}
  else{
    beep(300,'sine',0.3,0.3);beep(220,'sine',0.3,0.25,0.1);
    showPopup('💔 -1 Heart','#ff4444');
    state.running=false;if(animId){cancelAnimationFrame(animId);animId=null;}
    setTimeout(function(){
      if(!state)return;
      state.running=true;state.cars=[];invincible=true;invTimer=150;
      state.lastTime=performance.now();loop();
    },600);
  }
}

function draw(){
  drawRoad(state.doff);
  drawScenery();
  drawPickups();
  for(var i=0;i<state.cars.length;i++){var c=state.cars[i];c.x=LANES[c.lane];drawVehicle(c.x,c.y,c.col,c.style);}
  if(state.flash>0){ctx.fillStyle='rgba(255,40,40,'+(state.flash/18*0.5)+')';ctx.fillRect(0,0,W,H);}
  if(nitroActive){
    ctx.fillStyle='rgba(0,229,255,0.06)';ctx.fillRect(0,0,W,H);
    // speed lines
    ctx.strokeStyle='rgba(0,229,255,0.15)';ctx.lineWidth=1;
    for(var sl=0;sl<8;sl++){
      var slx=RL+Math.random()*RW;
      ctx.beginPath();ctx.moveTo(slx,0);ctx.lineTo(slx,H);ctx.stroke();
    }
  }
  if(shieldActive){ctx.fillStyle='rgba(245,166,35,0.04)';ctx.fillRect(0,0,W,H);}
  drawPlayer(state.playerX,state.playerY);
  // HUD power bar timer text
  if(nitroActive||shieldActive||slowActive){
    var activeT=nitroActive?nitroTimer:shieldActive?shieldTimer:slowTimer;
    var label=nitroActive?'⚡ NITRO':shieldActive?'🛡️ SHIELD':'🐢 SLOW';
    ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(W/2-55,H-28,110,18);
    ctx.fillStyle=nitroActive?'#00e5ff':shieldActive?'#f5a623':'#1D9E75';
    ctx.font='bold 11px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(label+' '+Math.ceil(activeT/60)+'s',W/2,H-19);
  }
}

function gameOver(){
  state.running=false;if(animId){cancelAnimationFrame(animId);animId=null;}
  stopMusic();
  if(state.score>best){best=state.score;save('best',best);}
  document.getElementById('overlay').style.display='flex';
  var fs=document.getElementById('finalScore');
  fs.style.display='block';
  fs.innerHTML='Score: '+state.score+'&nbsp;|&nbsp;'+Math.floor(state.elapsed)+'s<br><span style="color:#f5a623">🪙 +'+sessionCoins+' coins this run (total: '+totalCoins+')</span>';
  if(!adUsed)document.getElementById('watchAdBtn').style.display='block';
  document.getElementById('startBtn').textContent='▶ PLAY AGAIN';
}

// ── DRAG CONTROL ──
// Player can touch directly on the canvas and drag finger to move car
var dragActive=false, dragStartX=0, dragStartLane=1;
var DRAG_THRESHOLD=LW*0.35; // how far to drag to change lane

canvas.addEventListener('touchstart',function(e){
  // only if touch is in lower 60% of canvas (where car is)
  var rect=canvas.getBoundingClientRect();
  var touch=e.touches[0];
  var relY=(touch.clientY-rect.top)/rect.height;
  if(relY>0.3){ // lower portion of screen
    e.preventDefault();
    dragActive=true;
    dragStartX=touch.clientX;
    dragStartLane=state?state.playerLane:1;
    // visual feedback
    canvas.style.cursor='grabbing';
  }
},{passive:false});

canvas.addEventListener('touchmove',function(e){
  if(!dragActive||!state||!state.running)return;
  e.preventDefault();
  var touch=e.touches[0];
  var dx=touch.clientX-dragStartX;
  // scale dx by canvas display vs actual width
  var rect=canvas.getBoundingClientRect();
  var scale=W/rect.width;
  var scaledDx=dx*scale;
  // map drag distance to lane changes
  var laneDelta=Math.round(scaledDx/DRAG_THRESHOLD);
  var newLane=Math.max(0,Math.min(LC-1,dragStartLane+laneDelta));
  if(newLane!==state.playerLane){
    initAC();resumeAC();
    state.playerLane=newLane;
  }
},{passive:false});

canvas.addEventListener('touchend',function(e){
  dragActive=false;
  canvas.style.cursor='';
},{passive:true});

canvas.addEventListener('touchcancel',function(e){
  dragActive=false;
},{passive:true});

// Also support mouse drag for desktop testing
var mouseDrag=false, mouseDragStartX=0, mouseDragStartLane=1;
canvas.addEventListener('mousedown',function(e){
  var relY=e.offsetY/canvas.offsetHeight;
  if(relY>0.3){
    mouseDrag=true;mouseDragStartX=e.clientX;
    mouseDragStartLane=state?state.playerLane:1;
  }
});
canvas.addEventListener('mousemove',function(e){
  if(!mouseDrag||!state||!state.running)return;
  var dx=e.clientX-mouseDragStartX;
  var rect=canvas.getBoundingClientRect();
  var scale=W/rect.width;
  var scaledDx=dx*scale;
  var laneDelta=Math.round(scaledDx/DRAG_THRESHOLD);
  var newLane=Math.max(0,Math.min(LC-1,mouseDragStartLane+laneDelta));
  state.playerLane=newLane;
});
canvas.addEventListener('mouseup',function(){mouseDrag=false;});
canvas.addEventListener('mouseleave',function(){mouseDrag=false;});
</script>
